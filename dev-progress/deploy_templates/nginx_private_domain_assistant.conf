# Example Nginx site for Private Domain Assistant.
# Replace pda.example.com and certificate paths before use.

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name pda.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pda.example.com;

    ssl_certificate /etc/letsencrypt/live/pda.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pda.example.com/privkey.pem;

    client_max_body_size 600m;

    access_log /var/log/nginx/private-domain-assistant.access.log;
    error_log /var/log/nginx/private-domain-assistant.error.log;

    location /ws/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    location /admin/api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    location /downloads/desktop-releases/ {
        alias /data/private-domain-assistant/uploads/desktop-releases/;
        autoindex off;
        add_header Cache-Control "private, max-age=3600";
    }

    location /uploads/quick-search/ {
        alias /data/private-domain-assistant/uploads/quick-search/;
        autoindex off;
        add_header Cache-Control "public, max-age=86400";
    }
}
