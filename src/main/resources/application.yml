spring:
  application:
    name: private-domain-assistant
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/private_domain_assistant?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 3000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 1s
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          time-between-eviction-runs: 60s
  flyway:
    enabled: true
    locations: classpath:db/migration
  threads:
    virtual:
      enabled: false

app:
  mock-externals: ${MOCK_EXTERNALS:false}

cache:
  sync-cron: "0 */30 * * * *"
  ttl-seconds: 900
  load-batch-size: 500
  sync-timeout-ms: 10000
  max-sync-rows-per-round: 10000
  lock-spin-max: 3
  lock-spin-interval-ms: 100
  lock-ttl-s: 5

match:
  max-candidates: 5
  tag-removal-rules:
    - "L1-"
    - "L2-"
    - "A-"
    - "VIP-"
    - "V-"
  fuzzy-search-timeout-ms: 2000
  confidence-ratio-threshold: 0.5
  confidence-min-length: 2

followup:
  scan-batch-size: 5000
  full-scan-cron: "0 0 9 * * *"
  lightweight-scan-cron: "0 0 * * * *"
  rule-refresh-interval-s: 30
  tuan-alert-hours: 24
  xiansuo-alert-hours: 72
  pending-alert-hours: 24
  sleep-risk-days: 7
  loss-risk-days: 14
  appointment-remind-hours: 24
  scan-timeout-s: 300
  reminder-dedup-days: 1
  tag-suggestion-dedup-days: 7
  cursor-ttl-s: 3600
  keeper-overdue-leader-hours: 48

profile:
  extract-fields:
    - postpartumMonths
    - parity
    - deliveryMethod
    - breastfeeding
    - lochiaPeriod
    - bodyConcerns
    - diastasisRecti
    - urineLeakage
    - pubicLumbago
    - prevRepairExp
    - postpartumCheck
    - exerciseHabits
    - worries
    - intentLevel
    - personalityType
    - nextFollowupAt
    - nextFollowupDir
    - followupNotes
  extract-timeout-ms: 8000
  send-confirm-window-s: 5
  suggestion-expire-days: 7
  suggestion-cleanup-cron: "0 0 3 * * *"
  suggestion-max-per-customer: 20
  dedup-window-s: 5
  fallback-summary-chars: 500
