spring:
  application:
    name: private-domain-assistant
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/private_domain_assistant?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 3000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 1s
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          time-between-eviction-runs: 60s
  flyway:
    enabled: true
    locations: classpath:db/migration
  threads:
    virtual:
      enabled: false

app:
  mock-externals: ${MOCK_EXTERNALS:false}

cache:
  sync-cron: "0 */30 * * * *"
  ttl-seconds: 900
  load-batch-size: 500
  sync-timeout-ms: 10000
  max-sync-rows-per-round: 10000
  lock-spin-max: 3
  lock-spin-interval-ms: 100
  lock-ttl-s: 5

match:
  max-candidates: 5

followup:
  scan-batch-size: 5000
